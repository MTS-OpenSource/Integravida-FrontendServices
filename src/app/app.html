<main class="app-shell">
  <aside class="sidebar">
    <a routerLink="/dashboard" class="brand">
      <span class="brand-mark">IV</span>
      <span>
        <strong>IntegraVida</strong>
        <small>Patient health monitoring</small>
      </span>
    </a>

    <nav aria-label="Primary navigation">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/glucose-monitoring" routerLinkActive="active">Glucose</a>
      <a routerLink="/patient-profile" routerLinkActive="active">Patient Profile</a>
    </nav>

    <div class="sidebar-actions">
      @if (authStore.isAuthenticated()) {
        <button type="button" (click)="signOut()">Sign out</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      }
    </div>
  </aside>

  <section class="app-content">
    <router-outlet />
  </section>
</main>
