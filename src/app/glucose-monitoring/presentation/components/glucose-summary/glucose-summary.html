<div class="summary-grid">
  <article class="metric-card">
    <span class="label">{{ 'glucoseSummary.average' | i18n }}</span>
    <span class="value">{{ average() }} <small>mg/dL</small></span>
  </article>

  <article class="metric-card">
    <span class="label">{{ 'glucoseSummary.maximum' | i18n }}</span>
    <span class="value">{{ max() }} <small>mg/dL</small></span>
  </article>

  <article class="metric-card">
    <span class="label">{{ 'glucoseSummary.minimum' | i18n }}</span>
    <span class="value">{{ min() }} <small>mg/dL</small></span>
  </article>

  <article class="metric-card">
    <span class="label">{{ 'glucoseSummary.totalRecords' | i18n }}</span>
    <span class="value">{{ total() }}</span>
  </article>

  <article class="metric-card">
    <span class="label">{{ 'glucoseSummary.inRange' | i18n }}</span>
    <span class="value">{{ inRangePercent() }}%</span>
  </article>
</div>
