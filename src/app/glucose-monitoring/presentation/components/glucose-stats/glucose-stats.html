<div class="stats-container">
  <div class="stat-card">
    <span class="label">Tiempo en Rango</span>
    <span class="value">{{ timeInRange() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">Hiperglucemia</span>
    <span class="value">{{ hyperglycemia() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">Hipoglucemia</span>
    <span class="value">{{ hypoglycemia() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">Variabilidad</span>
    <span class="value">{{ variability() }}%</span>
  </div>

  <button class="btn-report">Generar Informe</button>
</div>
