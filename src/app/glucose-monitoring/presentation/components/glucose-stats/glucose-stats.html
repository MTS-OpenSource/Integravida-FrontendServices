<div class="stats-container">
  <div class="stat-card">
    <span class="label">{{ 'glucoseStats.timeInRange' | i18n }}</span>
    <span class="value">{{ timeInRange() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">{{ 'glucoseStats.hyperglycemia' | i18n }}</span>
    <span class="value">{{ hyperglycemia() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">{{ 'glucoseStats.hypoglycemia' | i18n }}</span>
    <span class="value">{{ hypoglycemia() }}%</span>
  </div>

  <div class="stat-card">
    <span class="label">{{ 'glucoseStats.variability' | i18n }}</span>
    <span class="value">{{ variability() }}%</span>
  </div>

  <button class="btn-report">{{ 'glucoseStats.generateReport' | i18n }}</button>
</div>
