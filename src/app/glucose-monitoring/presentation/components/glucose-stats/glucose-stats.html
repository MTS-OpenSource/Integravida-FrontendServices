<div class="stats-container">
  <div class="stat-card">
    <div class="icon teal">✓</div>
    <div class="stat-info">
      <span class="label">TIEMPO EN RANGO</span>
      <span class="value">{{ timeInRange() }}% <small>del tiempo</small></span>
    </div>
  </div>

  <div class="stat-card">
    <div class="icon red">📈</div>
    <div class="stat-info">
      <span class="label">HIPERGLUCEMIA</span>
      <span class="value">{{ hyperglycemia() }}% <small>sobre 180</small></span>
    </div>
  </div>

  <div class="stat-card">
    <div class="icon yellow">📉</div>
    <div class="stat-info">
      <span class="label">HIPOGLUCEMIA</span>
      <span class="value">{{ hypoglycemia() }}% <small>bajo 70</small></span>
    </div>
  </div>

  <div class="stat-card">
    <div class="icon purple">∿</div>
    <div class="stat-info">
      <span class="label">VARIABILIDAD (CV)</span>
      <span class="value">{{ variability() }}% <small>coef. var.</small></span>
    </div>
  </div>

  <button class="btn-report">📄 Generar informe</button>
</div>
