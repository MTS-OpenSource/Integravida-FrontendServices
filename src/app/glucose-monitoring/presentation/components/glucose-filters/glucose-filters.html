<div class="filters-container">
  <div class="date-filters">
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" [ngModel]="fromDate()" (ngModelChange)="fromDate.set($event)" />
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" [ngModel]="toDate()" (ngModelChange)="toDate.set($event)" />
    </div>
    <button class="btn-apply" (click)="applyFilters()">Filtrar</button>
  </div>

  <div class="quick-access">
    <div class="pills">
      <button [class.active]="activePeriod() === 'ultima-semana'" (click)="setPeriod('ultima-semana')">Semana</button>
      <button [class.active]="activePeriod() === 'ultimo-mes'" (click)="setPeriod('ultimo-mes')">Mes</button>
      <button [class.active]="activePeriod() === '3-meses'" (click)="setPeriod('3-meses')">3 meses</button>
      <button [class.active]="activePeriod() === 'este-año'" (click)="setPeriod('este-año')">Año</button>
    </div>
  </div>
</div>
