<div class="glucose-container">
  <header class="main-header">
    <div class="left-actions">
      <button class="btn-back" routerLink="/dashboard">Volver al Dashboard</button>
      <div class="logo">
        <span class="logo-text">GlucoSmart</span>
      </div>
    </div>
    
    <div class="user-profile">
      <div class="user-info">
        <span class="user-name">{{ authStore.currentUser()?.username ?? 'Usuario' }}</span>
        <span class="user-role">{{ authStore.currentUser()?.role ?? 'Paciente' }}</span>
      </div>
    </div>
  </header>

  <main class="content-wrapper">
    <section class="page-title">
      <h1>Historial de Glucosa</h1>
      <p>Resumen detallado y evolución de niveles.</p>
    </section>

    <section class="card" style="margin-bottom: 1rem;">
      <div class="form" style="grid-template-columns: 1fr auto; align-items: end;">
        <label class="full">
          <span>Patient UUID</span>
          <input
            type="text"
            [ngModel]="patientId()"
            (ngModelChange)="patientId.set($event)"
            placeholder="62a9e0f6-00e9-46bd-9ee8-f53b64a96030"
          />
        </label>

        <button type="button" class="primary" (click)="loadRecords()">Cargar lecturas</button>
      </div>
    </section>

    <app-glucose-filters (filterChanged)="onFilterChanged($event)" />

    <app-glucose-summary [records]="glucoseService.records()" />

    <div class="dashboard-grid">
      <div class="main-column">
        <app-glucose-chart [records]="glucoseService.records()" />
        <app-glucose-stats [records]="glucoseService.records()" />
      </div>
      <div class="side-column">
        <app-glucose-table [records]="glucoseService.records()" />
      </div>
    </div>
  </main>
</div>
