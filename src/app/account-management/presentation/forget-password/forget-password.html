<main class="forgot-page">
  <section class="forgot-card iv-glass">
    <div class="auth-brand">
      <span class="auth-brand-mark">
        <span class="material-symbols-outlined">ecg_heart</span>
      </span>
      <span>Integra<span>Vida</span></span>
    </div>

    <header>
      <h1>{{ 'forgot.title' | i18n }}</h1>
      <p>{{ 'forgot.description' | i18n }}</p>
    </header>

    <div class="form">
      <div class="iv-field">
        <label>{{ 'forgot.email' | i18n }}</label>
        <input type="email" placeholder="you@example.com" />
      </div>

      <button class="iv-btn iv-btn-primary" type="button">{{ 'forgot.send' | i18n }}</button>
    </div>
  </section>

  <div class="footer">
    <a href="#">{{ 'login.helpCenter' | i18n }}</a>
    <span>·</span>
    <a href="#">{{ 'login.privacy' | i18n }}</a>
    <span>·</span>
    <a href="#">{{ 'login.terms' | i18n }}</a>
  </div>
</main>
