<div class="page">
  <div class="brand">
    <span class="brand-name">IntegraVida</span>
  </div>

  <div class="card">
    <div class="tabs">{{ 'forgot.title' | i18n }}</div>
    <div class="form">
      <span>{{ 'forgot.description' | i18n }}</span>

      <div class="field">
        <label>{{ 'forgot.email' | i18n }}</label>
        <input type="email" placeholder="you@example.com" />
      </div>

      <button class="btn-primary" type="button">{{ 'forgot.send' | i18n }}</button>
    </div>
  </div>

  <div class="footer">
    <a href="#">{{ 'login.helpCenter' | i18n }}</a>
    <span>·</span>
    <a href="#">{{ 'login.privacy' | i18n }}</a>
    <span>·</span>
    <a href="#">{{ 'login.terms' | i18n }}</a>
  </div>
</div>
