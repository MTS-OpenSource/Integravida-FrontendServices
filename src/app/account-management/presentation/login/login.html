<section class="auth-page">
  <form class="auth-card" (ngSubmit)="signIn()">
    <div>
      <span class="eyebrow">Account Management</span>
      <h1>Iniciar sesión</h1>
      <p>Ingresa con tu usuario para acceder al dashboard de IntegraVida.</p>
    </div>

    <label>
      <span>Usuario</span>
      <input
        autocomplete="username"
        name="identifier"
        required
        [ngModel]="identifier()"
        (ngModelChange)="identifier.set($event)"
      />
    </label>

    <label>
      <span>Contraseña</span>
      <input
        autocomplete="current-password"
        name="password"
        required
        type="password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
      />
    </label>

    @if (authStore.error()) {
      <p class="error">{{ authStore.error() }}</p>
    }

    <button type="submit" [disabled]="authStore.loading()">
      {{ authStore.loading() ? 'Validando...' : 'Entrar' }}
    </button>

    <p class="auth-link">
      ¿No tienes cuenta?
      <a routerLink="/register">Crear cuenta</a>
    </p>
  </form>
</section>
